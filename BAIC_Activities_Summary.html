<!DOCTYPE html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAIC D+1 Follow up Activity</title>
<style>
  :root{
    --bg:#F7F4F4;
    --panel:#FFFFFF;
    --line:#EFE6E5;
    --text:#241A19;
    --text-dim:#7A6E6C;
    --text-mute:#B5A9A7;
    --red:#D1251A;
    --red-soft:#FBE6E4;
    --green:#1FA15A;
    --green-soft:#E5F5EC;
    --blue:#8C2A22;
    --blue-soft:#F6E6E4;
    --skyblue:#E2453A;
    --gray:#D9CFCD;
    --gray-soft:#F4EEED;
    --amber:#F0A500;
    --totalbar:#F1A501;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--text);font-family:var(--sans);}
  body{min-height:100vh;padding-bottom:3rem;}

  .header{
    background:linear-gradient(120deg,#1A0F0E 0%,#5C1812 55%,#D1251A 100%);
    color:#fff;
    padding:1.6rem 2.5rem;
    display:flex;
    align-items:center;
    gap:1.2rem;
  }
  .header .logo{
    height:46px;display:flex;align-items:center;
    background:#fff;border-radius:6px;padding:6px 12px;
  }
  .header .logo img{height:32px;display:block;}
  .header .titles h1{font-size:1.45rem;font-weight:700;letter-spacing:0.01em;}
  .header .titles p{font-size:0.82rem;color:#F1D2CE;margin-top:0.15rem;}

  .wrap{max-width:1400px;margin:0 auto;padding:0 2.5rem;}

  .section-label{
    font-size:0.72rem;font-weight:700;letter-spacing:0.12em;
    color:#7C8AA0;text-transform:uppercase;
    padding:1.6rem 0 0.8rem;
    border-bottom:1px solid var(--line);
    margin-bottom:1.2rem;
  }

  .kpi-row{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:1rem;
  }
  .kpi{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    padding:1rem 1.1rem;
    border-top:3px solid var(--blue);
    box-shadow:0 1px 2px rgba(20,30,50,0.04);
  }
  .kpi.kpi-accent{border-top-color:var(--green);}
  .kpi .range{
    font-size:0.65rem;font-weight:700;letter-spacing:0.06em;
    color:var(--text-mute);text-transform:uppercase;margin-bottom:0.5rem;
  }
  .kpi .title{font-size:0.82rem;color:var(--text-dim);margin-bottom:0.3rem;}
  .kpi .value{font-size:1.7rem;font-weight:800;color:var(--text);letter-spacing:-0.01em;}
  .kpi .sub{font-size:0.74rem;color:var(--text-mute);margin-top:0.35rem;}
  .kpi .delta{font-size:0.74rem;margin-top:0.25rem;font-weight:600;}
  .kpi .delta.up{color:var(--green);}
  .kpi .delta.down{color:var(--red);}

  .funnel-row{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:1rem;
    margin-bottom:2rem;
  }
  .funnel-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    padding:1.2rem 1.3rem 1.4rem;
    box-shadow:0 1px 2px rgba(20,30,50,0.04);
  }
  .funnel-card h3{font-size:1rem;font-weight:700;}
  .funnel-card .journey{
    font-size:0.74rem;color:var(--text-mute);margin-top:0.15rem;margin-bottom:1.1rem;
  }
  .funnel-card .sub-title{
    font-size:0.88rem;font-weight:700;color:var(--text);
    margin:0.9rem 0 0.6rem;
  }

  .fbar-row{
    display:grid;
    grid-template-columns:90px 1fr;
    align-items:center;
    gap:0.6rem;
    margin-bottom:0.6rem;
  }
  .fbar-label{
    font-size:0.78rem;color:var(--text-dim);text-align:right;
    white-space:nowrap;
  }
  .fbar-track{position:relative;height:30px;}
  .fbar-fill{
    height:100%;border-radius:4px;
    display:flex;align-items:center;
    padding:0 0.6rem;
    font-weight:700;font-size:0.85rem;color:#fff;
    min-width:36px;
  }
  .fbar-fill.gray{color:var(--text-mute);background:var(--gray-soft);border:1px solid var(--gray);}

  .reasons-label{
    font-size:0.7rem;font-weight:700;letter-spacing:0.1em;color:var(--text-mute);
    text-transform:uppercase;margin:1.3rem 0 0.7rem;
  }
  .reason-row{
    display:grid;
    grid-template-columns:1fr 1.4fr 32px;
    align-items:center;
    gap:0.5rem;
    margin-bottom:0.45rem;
  }
  .reason-label{font-size:0.78rem;color:var(--text-dim);}
  .reason-track{
    height:8px;background:var(--gray-soft);border-radius:4px;overflow:hidden;
  }
  .reason-fill{height:100%;border-radius:4px;}
  .reason-val{font-size:0.78rem;color:var(--text-dim);text-align:right;font-weight:600;}

  .reason-row.with-detail{margin-bottom:0.15rem;}
  .reason-detail{
    grid-column:1 / -1;
    font-size:0.7rem;color:var(--text-mute);
    margin:0 0 0.7rem;
    padding-left:0.1rem;
  }
  .reason-detail b{color:var(--text-dim);font-weight:600;}

  .advisor-group{margin-bottom:1.1rem;}
  .advisor-group-head{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:0.5rem;
  }
  .advisor-group-head .reason-name{
    font-size:0.82rem;font-weight:700;color:var(--text);
  }
  .advisor-group-head .reason-count{
    font-size:0.72rem;font-weight:700;color:#fff;
    background:var(--amber);border-radius:10px;
    padding:0.1rem 0.55rem;
  }
  .advisor-item{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--gray-soft);
    border-radius:6px;
    padding:0.45rem 0.7rem;
    margin-bottom:0.35rem;
  }
  .advisor-item:last-child{margin-bottom:0;}
  .advisor-item .name{font-size:0.78rem;font-weight:600;color:var(--text);}
  .advisor-item .branch{
    font-size:0.7rem;color:var(--text-mute);
    background:var(--panel);border:1px solid var(--line);
    border-radius:4px;padding:0.1rem 0.5rem;
  }

  .detail-table-wrap{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    padding:1.2rem 1.3rem 1.4rem;
    box-shadow:0 1px 2px rgba(20,30,50,0.04);
    overflow-x:auto;
    margin-bottom:2rem;
  }
  .detail-table-wrap h3{font-size:1rem;font-weight:700;margin-bottom:0.2rem;}
  .detail-table-wrap .journey{
    font-size:0.74rem;color:var(--text-mute);margin-bottom:1rem;
  }
  table.detail-table{
    width:100%;border-collapse:collapse;font-size:0.82rem;min-width:760px;
  }
  table.detail-table th{
    text-align:left;font-size:0.7rem;font-weight:700;letter-spacing:0.06em;
    text-transform:uppercase;color:var(--text-mute);
    padding:0.6rem 0.7rem;border-bottom:2px solid var(--line);
  }
  table.detail-table td{
    padding:0.65rem 0.7rem;border-bottom:1px solid var(--line);
    color:var(--text-dim);vertical-align:top;
  }
  table.detail-table tr:last-child td{border-bottom:none;}
  table.detail-table td.hl{color:var(--text);font-weight:600;}
  table.detail-table td.wip{font-family:monospace;font-size:0.78rem;color:var(--text-mute);}
  table.detail-table .status-pill{
    display:inline-block;font-size:0.7rem;font-weight:700;
    padding:0.15rem 0.55rem;border-radius:10px;
  }
  table.detail-table .status-pill.no{background:var(--red-soft);color:var(--red);}
  table.detail-table .status-pill.yes{background:var(--green-soft);color:var(--green);}
  table.detail-table .reason-tag{
    display:inline-block;font-size:0.72rem;font-weight:600;
    background:var(--amber);color:#fff;
    padding:0.15rem 0.55rem;border-radius:5px;
    white-space:nowrap;
  }
  table.detail-table .comment-cell{
    font-size:0.76rem;line-height:1.5;max-width:280px;
  }
  table.detail-table .comment-cell .ar{direction:rtl;unicode-bidi:embed;display:block;}
  table.detail-table .comment-cell .none{color:var(--text-mute);font-style:italic;}

  .accordion{display:flex;flex-direction:column;gap:0.6rem;}
  .accordion-item{
    border:1px solid var(--line);
    border-radius:8px;
    overflow:hidden;
  }
  .accordion-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:0.85rem 1.1rem;
    background:var(--gray-soft);
    cursor:pointer;
    user-select:none;
    transition:background 0.15s ease;
  }
  .accordion-header:hover{background:var(--red-soft);}
  .accordion-header .branch-name{
    font-size:0.92rem;font-weight:700;color:var(--text);
    display:flex;align-items:center;gap:0.6rem;
  }
  .accordion-header .branch-meta{
    display:flex;align-items:center;gap:0.6rem;
  }
  .accordion-header .case-count{
    font-size:0.72rem;font-weight:700;color:#fff;
    background:var(--amber);border-radius:10px;
    padding:0.15rem 0.6rem;
  }
  .accordion-header .chevron{
    font-size:0.8rem;color:var(--text-mute);
    transition:transform 0.2s ease;
  }
  .accordion-item.open .chevron{transform:rotate(90deg);}
  .accordion-body{
    max-height:0;overflow:hidden;
    transition:max-height 0.25s ease;
  }
  .accordion-item.open .accordion-body{max-height:1200px;}
  .accordion-case{
    padding:0.9rem 1.1rem;
    border-top:1px solid var(--line);
  }
  .accordion-case:first-child{border-top:1px solid var(--line);}
  .accordion-case-head{
    display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;gap:0.5rem;
    margin-bottom:0.5rem;
  }
  .accordion-case-head .customer{font-size:0.85rem;font-weight:600;color:var(--text);}
  .accordion-case-head .wip-tag{
    font-family:monospace;font-size:0.72rem;color:var(--text-mute);
  }
  .accordion-case-tags{display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;margin-bottom:0.5rem;}
  .accordion-case-comment{
    font-size:0.8rem;line-height:1.55;color:var(--text-dim);
    background:var(--gray-soft);border-radius:6px;
    padding:0.6rem 0.8rem;
  }
  .accordion-case-comment.none{font-style:italic;color:var(--text-mute);}

  .accordion-table{width:100%;border-collapse:collapse;}
  .accordion-table th{
    text-align:left;font-size:0.7rem;font-weight:700;letter-spacing:0.06em;
    text-transform:uppercase;color:var(--text-mute);
    padding:0.7rem 1.1rem 0.5rem;
  }
  .accordion-table td{
    padding:0.75rem 1.1rem;border-top:1px solid var(--line);
    color:var(--text-dim);vertical-align:top;font-size:0.85rem;
  }
  .accordion-table td.customer-cell{font-weight:600;color:var(--text);white-space:nowrap;}
  .accordion-table td.comment-cell{font-size:0.8rem;line-height:1.5;}
  .accordion-table td.comment-cell .none{color:var(--text-mute);font-style:italic;}

  .accordion-item.reason-group > .accordion-header{
    background:var(--blue-soft);
  }
  .accordion-item.reason-group > .accordion-header:hover{background:var(--red-soft);}
  .accordion-item.reason-group .branch-name{font-size:0.95rem;}
  .nested-accordion{padding:0.4rem 0.7rem 0.7rem;display:flex;flex-direction:column;gap:0.45rem;}
  .nested-accordion .accordion-item{border-radius:6px;}
  .nested-accordion .accordion-header{padding:0.6rem 0.9rem;background:var(--panel);border:1px solid var(--line);border-radius:6px;}
  .nested-accordion .accordion-header:hover{background:var(--gray-soft);}
  .nested-accordion .branch-name{font-size:0.85rem;font-weight:600;}
  .nested-accordion .accordion-item.open > .accordion-header{border-bottom-left-radius:0;border-bottom-right-radius:0;}
  .nested-accordion .accordion-body table.accordion-table{font-size:0.8rem;}

  /* Pivot table */
  table.pivot-table{
    width:100%;border-collapse:collapse;font-size:0.85rem;
  }
  table.pivot-table th{
    text-align:center;font-size:0.72rem;font-weight:700;color:var(--text-dim);
    background:var(--gray-soft);
    padding:0.6rem 0.7rem;border:1px solid var(--line);
    line-height:1.3;
  }
  table.pivot-table th.pivot-corner{text-align:left;background:var(--panel-2,var(--gray-soft));}
  table.pivot-table th.pivot-total{background:var(--blue-soft);color:var(--blue);}
  table.pivot-table td{
    border:1px solid var(--line);
    padding:0.6rem 0.7rem;text-align:center;
    color:var(--text-dim);
  }
  table.pivot-table td.pivot-branch{
    text-align:left;font-weight:700;color:var(--text);
    background:var(--gray-soft);
  }
  table.pivot-table td.pivot-total{
    font-weight:700;background:var(--blue-soft);color:var(--blue);
  }
  table.pivot-table tr.pivot-grand td{
    font-weight:700;background:var(--gray-soft);color:var(--text);
  }
  table.pivot-table tr.pivot-grand td.pivot-total{
    background:var(--red);color:#fff;
  }
  table.pivot-table td.pivot-cell.active{
    font-weight:700;color:#fff;background:var(--amber);
    cursor:pointer;border-radius:5px;
    transition:transform 0.12s ease, box-shadow 0.12s ease;
  }
  table.pivot-table td.pivot-cell.active:hover{
    transform:scale(1.06);
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
  }
  table.pivot-table td.pivot-cell.active.selected{
    background:var(--red);
    box-shadow:0 0 0 2px var(--red-soft) inset;
  }

  /* Case detail panel */
  .case-detail{
    margin-top:1.2rem;
    border:1px dashed var(--line);
    border-radius:8px;
    padding:1rem 1.2rem;
    background:var(--gray-soft);
    min-height:60px;
  }
  .case-detail-placeholder{
    font-size:0.82rem;color:var(--text-mute);font-style:italic;
    display:flex;align-items:center;height:40px;
  }
  .case-detail-head{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:0.6rem;flex-wrap:wrap;gap:0.4rem;
  }
  .case-detail-title{font-size:1rem;font-weight:700;color:var(--text);}
  .case-detail .wip-tag{font-family:monospace;font-size:0.75rem;color:var(--text-mute);}
  .case-detail-tags{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.8rem;}
  .case-detail-tags .pill-static{
    display:inline-block;font-size:0.72rem;font-weight:600;
    padding:0.15rem 0.6rem;border-radius:5px;
    background:var(--panel);border:1px solid var(--line);color:var(--text-dim);
  }
  .case-detail-comment-label{
    font-size:0.68rem;font-weight:700;letter-spacing:0.1em;
    text-transform:uppercase;color:var(--text-mute);margin-bottom:0.35rem;
  }
  .case-detail-comment{
    font-size:0.85rem;line-height:1.6;color:var(--text-dim);
    background:var(--panel);border:1px solid var(--line);
    border-radius:6px;padding:0.7rem 0.9rem;
  }
  .case-detail-comment .none{font-style:italic;color:var(--text-mute);}

  @media (max-width:760px){
    table.pivot-table{font-size:0.72rem;}
    table.pivot-table th, table.pivot-table td{padding:0.4rem 0.35rem;}
  }

  @media (max-width:1200px){
    .kpi-row{grid-template-columns:repeat(3,1fr);}
    .funnel-row{grid-template-columns:repeat(2,1fr);}
  }
  @media (max-width:760px){
    .kpi-row{grid-template-columns:repeat(2,1fr);}
    .funnel-row{grid-template-columns:1fr;}
    .wrap{padding:0 1.1rem;}
    .header{padding:1.2rem 1.1rem;}
  }

  .load-status{
    text-align:center;padding:2rem;color:var(--text-mute);
    font-size:0.85rem;
  }
  .load-status.error{color:var(--red);}
  .refresh-bar{
    display:flex;align-items:center;justify-content:flex-end;
    gap:0.6rem;font-size:0.74rem;color:var(--text-mute);
    padding:0.6rem 0;
  }
  .refresh-bar button{
    font-size:0.74rem;font-weight:600;color:var(--red);
    background:var(--red-soft);border:1px solid var(--red-soft);
    border-radius:5px;padding:0.3rem 0.8rem;cursor:pointer;
  }
  .refresh-bar button:hover{background:var(--gray-soft);}
  .refresh-bar .dot{
    display:inline-block;width:7px;height:7px;border-radius:50%;
    background:var(--green);
  }
  .refresh-bar{flex-wrap:wrap;}
  .refresh-bar .filter-label{
    font-weight:600;color:var(--text-dim);margin-left:0.6rem;
  }
  .refresh-bar select{
    font-size:0.78rem;font-family:var(--sans);color:var(--text);
    background:var(--panel);border:1px solid var(--line);
    border-radius:5px;padding:0.3rem 0.6rem;cursor:pointer;
  }
  .refresh-bar select:focus{outline:2px solid var(--red-soft);}
</style>
</head>

  <div class="titles">
    <h1>BAIC D+1 Follow up Activity</h1>
    <p>Executive Performance Dashboard &mdash; Live from Google Sheets</p>
  </div>
</div>

<div class="wrap">

  <div class="refresh-bar">
    <span id="sync-status"><span class="dot"></span> Live &middot; <span id="last-updated">loading...</span></span>
    <label for="date-filter" class="filter-label">Date Due In:</label>
    <select id="date-filter" onchange="onFilterChange()">
      <option value="all">All dates</option>
    </select>
    <button onclick="loadData()">Refresh now</button>
  </div>

  <div id="load-status" class="load-status">Loading live data from Google Sheets&hellip;</div>

  <div id="dashboard-content" style="display:none;">

    <div class="section-label">Key Performance Indicators</div>
    <div class="kpi-row" id="kpi-row"></div>

    <div class="section-label">Conversion Funnels</div>
    <div class="funnel-row" id="funnel-row"></div>

    <div id="detail-section"></div>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
const SHEET_ID = "1_e57uV5g9ycFx3Cm9XaCW-0SxDPKPJ6Q0rmO2KMYQiU";
const GID = "0";
const CSV_URL = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/export?format=csv&gid=" + GID;

let selectedCase = null;
let CASES = [];
let ALL_ROWS = [];
let CURRENT_FILTER = 'all';

function pct(n, d) {
  if (!d) return "0.0";
  return (100 * n / d).toFixed(1);
}

function esc(s) {
  if (s === null || s === undefined) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function loadData() {
  document.getElementById('load-status').style.display = 'block';
  document.getElementById('load-status').className = 'load-status';
  document.getElementById('load-status').textContent = 'Loading live data from Google Sheets…';
  document.getElementById('dashboard-content').style.display = 'none';

  Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
      try {
        ALL_ROWS = results.data.filter(r => (r['Branch'] && r['Branch'].trim() !== ''));
        populateDateFilter(ALL_ROWS);
        applyFilterAndRender();
        document.getElementById('load-status').style.display = 'none';
        document.getElementById('dashboard-content').style.display = 'block';
        document.getElementById('last-updated').textContent = new Date().toLocaleString();
      } catch (e) {
        document.getElementById('load-status').className = 'load-status error';
        document.getElementById('load-status').textContent = 'Error rendering data: ' + e.message;
      }
    },
    error: function(err) {
      document.getElementById('load-status').className = 'load-status error';
      document.getElementById('load-status').textContent = 'Could not load the Google Sheet. Make sure it is shared as "Anyone with the link can view". (' + err + ')';
    }
  });
}

function parseDueDate(str) {
  // expects DD/MM/YYYY
  if (!str) return null;
  const parts = str.trim().split('/');
  if (parts.length !== 3) return null;
  const [d, m, y] = parts;
  return y + '-' + m.padStart(2,'0') + '-' + d.padStart(2,'0'); // ISO for sorting
}

function formatDueDate(isoStr) {
  const [y, m, d] = isoStr.split('-');
  return d + '/' + m + '/' + y;
}

function populateDateFilter(rows) {
  const dates = new Set();
  rows.forEach(r => {
    const iso = parseDueDate(r['Date Due In']);
    if (iso) dates.add(iso);
  });
  const sorted = [...dates].sort();

  const select = document.getElementById('date-filter');
  const prevValue = CURRENT_FILTER;
  select.innerHTML = '<option value="all">All dates</option>';
  sorted.forEach(iso => {
    const opt = document.createElement('option');
    opt.value = iso;
    opt.textContent = formatDueDate(iso);
    select.appendChild(opt);
  });

  // restore previous selection if still valid, else default to all
  if (prevValue !== 'all' && sorted.includes(prevValue)) {
    select.value = prevValue;
  } else {
    select.value = 'all';
    CURRENT_FILTER = 'all';
  }
}

function onFilterChange() {
  CURRENT_FILTER = document.getElementById('date-filter').value;
  applyFilterAndRender();
}

function applyFilterAndRender() {
  let rows = ALL_ROWS;
  if (CURRENT_FILTER !== 'all') {
    rows = ALL_ROWS.filter(r => parseDueDate(r['Date Due In']) === CURRENT_FILTER);
  }
  render(rows);
}

function render(rows) {
  const total = rows.length;
  const answered = rows.filter(r => (r['Status']||'').trim() === 'Answered');
  const noAnswer = rows.filter(r => (r['Status']||'').trim() === 'No Answer');
  const closed = rows.filter(r => (r['Status']||'').trim() === 'Closed');
  const noAnswerTotal = noAnswer.length + closed.length;

  const attended = answered.filter(r => (r['Customer Attented?']||'').trim() === 'Yes');
  const notAttended = answered.filter(r => (r['Customer Attented?']||'').trim() === 'No');

  const satisfied = attended.filter(r => (r['If yes? Satisfied?']||'').trim() === 'Yes');
  const notSatisfied = attended.filter(r => (r['If yes? Satisfied?']||'').trim() === 'No');

  // ---------- KPI ROW ----------
  const dateRange = "LIVE";
  const kpiHtml = `
    <div class="kpi">
      <div class="range">${dateRange}</div>
      <div class="title">Total Calls</div>
      <div class="value">${total}</div>
      <div class="sub">${answered.length} answered (${pct(answered.length,total)}%)</div>
    </div>
    <div class="kpi">
      <div class="range">${dateRange}</div>
      <div class="title">Calls Attended</div>
      <div class="value">${attended.length}</div>
      <div class="sub">of ${answered.length} answered (${pct(attended.length,answered.length)}%)</div>
    </div>
    <div class="kpi kpi-accent">
      <div class="range">${dateRange}</div>
      <div class="title">CSAT Satisfaction</div>
      <div class="value">${pct(satisfied.length,attended.length)}%</div>
      <div class="sub">${satisfied.length} of ${attended.length} satisfied</div>
      <div class="delta down">${notSatisfied.length} unsatisfied</div>
    </div>
    <div class="kpi">
      <div class="range">${dateRange}</div>
      <div class="title">No Answer</div>
      <div class="value">${noAnswerTotal}</div>
      <div class="sub">${pct(noAnswerTotal,total)}% of total batch</div>
    </div>
  `;
  document.getElementById('kpi-row').innerHTML = kpiHtml;

  // ---------- FUNNEL ROW ----------

  // --- Card 1: Call Outcome ---
  const card1 = `
    <div class="funnel-card">
      <h3>Call Outcome</h3>
      <div class="journey">Dial &rarr; Answered journey</div>

      <div class="fbar-row">
        <div class="fbar-label">Total Calls</div>
        <div class="fbar-track"><div class="fbar-fill" style="width:100%;background:var(--totalbar);">${total}</div></div>
      </div>
      <div class="fbar-row">
        <div class="fbar-label">Answered</div>
        <div class="fbar-track"><div class="fbar-fill" style="width:${pct(answered.length,total)}%;background:var(--totalbar);">${answered.length}</div></div>
      </div>
      <div class="fbar-row">
        <div class="fbar-label">No Answer</div>
        <div class="fbar-track"><div class="fbar-fill" style="width:${pct(noAnswerTotal,total)}%;background:var(--red);">${noAnswerTotal}</div></div>
      </div>

      <div class="reasons-label">Status Mix</div>
      <div class="reason-row">
        <div class="reason-label">Answered</div>
        <div class="reason-track"><div class="reason-fill" style="width:${pct(answered.length,total)}%;background:var(--totalbar);"></div></div>
        <div class="reason-val">${answered.length}</div>
      </div>
      <div class="reason-row">
        <div class="reason-label">No Answer</div>
        <div class="reason-track"><div class="reason-fill" style="width:${pct(noAnswerTotal,total)}%;background:var(--red);"></div></div>
        <div class="reason-val">${noAnswerTotal}</div>
      </div>
    </div>
  `;

  // --- Card 2: Attendance ---
  const notAttendReasons = {};
  notAttended.forEach(r => {
    const reason = (r["Why didn't attend?"]||'').trim() || 'Not specified';
    notAttendReasons[reason] = (notAttendReasons[reason]||0) + 1;
  });
  let notAttendRows = '';
  const maxNA = Math.max(1, ...Object.values(notAttendReasons));
  Object.entries(notAttendReasons).forEach(([reason, count]) => {
    notAttendRows += `
      <div class="reason-row">
        <div class="reason-label">${esc(reason)}</div>
        <div class="reason-track"><div class="reason-fill" style="width:${(count/maxNA*100).toFixed(0)}%;background:var(--blue);"></div></div>
        <div class="reason-val">${count}</div>
      </div>`;
  });
  if (notAttended.length === 0) {
    notAttendRows = '<div class="reason-row"><div class="reason-label" style="font-style:italic;color:var(--text-mute);">None</div><div class="reason-track"></div><div class="reason-val"></div></div>';
  }

  const card2 = `
    <div class="funnel-card">
      <h3>Attendance</h3>
      <div class="journey">Answered &rarr; Attended journey</div>

      <div class="sub-title">Total Answered</div>
      <div class="fbar-row" style="grid-template-columns:1fr;">
        <div class="fbar-track"><div class="fbar-fill" style="width:100%;background:var(--totalbar);">${answered.length}</div></div>
      </div>

      <div class="sub-title">Attended</div>
      <div class="fbar-row" style="grid-template-columns:1fr;">
        <div class="fbar-track"><div class="fbar-fill" style="width:${pct(attended.length,answered.length)}%;background:var(--green);">${attended.length}</div></div>
      </div>

      <div class="sub-title">Did Not Attend</div>
      <div class="fbar-row" style="grid-template-columns:1fr;">
        <div class="fbar-track"><div class="fbar-fill" style="width:${pct(notAttended.length,answered.length)}%;background:var(--red);">${notAttended.length}</div></div>
      </div>

      <div class="reasons-label">Did Not Attend &mdash; Reasons</div>
      ${notAttendRows}
    </div>
  `;

  // --- Card 3: Satisfaction ---
  const satReasons = {};
  notSatisfied.forEach(r => {
    const reason = (r['If not Satisfied, why?']||'').trim() || 'Not specified';
    satReasons[reason] = (satReasons[reason]||0) + 1;
  });
  let satRows = '';
  const maxSat = Math.max(1, ...Object.values(satReasons));
  Object.entries(satReasons).forEach(([reason, count]) => {
    satRows += `
      <div class="reason-row">
        <div class="reason-label">${esc(reason)}</div>
        <div class="reason-track"><div class="reason-fill" style="width:${(count/maxSat*100).toFixed(0)}%;background:var(--amber);"></div></div>
        <div class="reason-val">${count}</div>
      </div>`;
  });

  const card3 = `
    <div class="funnel-card">
      <h3>Satisfaction</h3>
      <div class="journey">Attended &rarr; Satisfied journey</div>

      <div class="sub-title">Satisfied</div>
      <div class="fbar-row" style="grid-template-columns:1fr;">
        <div class="fbar-track"><div class="fbar-fill" style="width:${pct(satisfied.length,attended.length)}%;background:var(--green);">${satisfied.length}</div></div>
      </div>

      <div class="sub-title">Not Satisfied</div>
      <div class="fbar-row" style="grid-template-columns:1fr;">
        <div class="fbar-track"><div class="fbar-fill" style="width:${pct(notSatisfied.length,attended.length)}%;background:var(--red);">${notSatisfied.length}</div></div>
      </div>

      <div class="reasons-label">Reasons Not Satisfied</div>
      ${satRows || '<div class="reason-row"><div class="reason-label" style="font-style:italic;color:var(--text-mute);">None</div><div class="reason-track"></div><div class="reason-val"></div></div>'}
    </div>
  `;

  // --- Card 4: Branch & Booking Mix ---
  const branchCounts = {};
  rows.forEach(r => {
    const b = (r['Branch']||'').trim();
    if (!b) return;
    branchCounts[b] = (branchCounts[b]||0) + 1;
  });
  const topBranches = Object.entries(branchCounts).sort((a,b)=>b[1]-a[1]).slice(0,4);
  const maxBranch = topBranches.length ? topBranches[0][1] : 1;
  let branchRows = '';
  topBranches.forEach(([b,count]) => {
    branchRows += `
      <div class="fbar-row">
        <div class="fbar-label">${esc(b.replace(/^\d+\s*-?\s*/,'').trim())}</div>
        <div class="fbar-track"><div class="fbar-fill" style="width:${(count/maxBranch*100).toFixed(0)}%;background:var(--skyblue);">${count}</div></div>
      </div>`;
  });

  const card4 = `
    <div class="funnel-card">
      <h3>Branch Volume</h3>
      <div class="journey">Branches by volume</div>

      <div class="sub-title">Branches by Volume</div>
      ${branchRows}
    </div>
  `;

  document.getElementById('funnel-row').innerHTML = card1 + card2 + card3 + card4;

  // ---------- DETAIL SECTION: PIVOT TABLE ----------
  CASES = notSatisfied.map((r, i) => ({
    id: 'case' + i,
    branch: (r['Branch']||'').trim().replace(/^\d+\s*-?\s*/,'').trim(),
    reason: (r['If not Satisfied, why?']||'').trim() || 'Not specified',
    customer: (r['Customer Full Name']||'').trim(),
    wip: (r['WIP']||'').trim(),
    comment: (r['Comment']||'').trim() || 'No comment'
  }));

  const reasonsSet = [...new Set(CASES.map(c=>c.reason))];
  const branchesSet = [...new Set(CASES.map(c=>c.branch))];

  // build pivot matrix
  let theadCols = reasonsSet.map(r => `<th>${esc(r)}</th>`).join('');
  let bodyRows = '';
  const colTotals = {};
  reasonsSet.forEach(r => colTotals[r]=0);

  branchesSet.forEach(branch => {
    let rowTotal = 0;
    let cells = '';
    reasonsSet.forEach(reason => {
      const matchCase = CASES.find(c => c.branch===branch && c.reason===reason);
      if (matchCase) {
        cells += `<td class="pivot-cell active" onclick="showCase('${matchCase.id}')">1</td>`;
        rowTotal += 1;
        colTotals[reason] += 1;
      } else {
        cells += `<td class="pivot-cell">&nbsp;</td>`;
      }
    });
    bodyRows += `<tr><td class="pivot-branch">${esc(branch)}</td>${cells}<td class="pivot-total">${rowTotal}</td></tr>`;
  });

  const grandTotal = CASES.length;
  let grandRow = `<tr class="pivot-grand"><td class="pivot-branch">Grand Total</td>`;
  reasonsSet.forEach(r => grandRow += `<td class="pivot-total">${colTotals[r]}</td>`);
  grandRow += `<td class="pivot-total">${grandTotal}</td></tr>`;

  let caseDataHtml = '';
  CASES.forEach(c => {
    caseDataHtml += `<div data-case="${c.id}" data-branch="${esc(c.branch)}" data-reason="${esc(c.reason)}" data-customer="${esc(c.customer)}" data-wip="${esc(c.wip)}" data-comment="${esc(c.comment)}"></div>`;
  });

  let detailHtml = '';
  if (CASES.length > 0) {
    detailHtml = `
      <div class="section-label">Unsatisfied Customers — Detail</div>
      <div class="detail-table-wrap">
        <h3>Reasons Not Satisfied — Pivot by Branch</h3>
        <div class="journey">Attended &rarr; Not satisfied (${CASES.length} of ${attended.length}) journey &middot; click a number to view the case details</div>

        <table class="pivot-table">
          <thead>
            <tr>
              <th class="pivot-corner">Branch \ Reason</th>
              ${theadCols}
              <th class="pivot-total">Total</th>
            </tr>
          </thead>
          <tbody>
            ${bodyRows}
            ${grandRow}
          </tbody>
        </table>

        <div id="case-detail" class="case-detail">
          <div class="case-detail-placeholder">Click a number above to see the branch, reason, and comment for that case.</div>
        </div>

        <div id="case-data" style="display:none;">
          ${caseDataHtml}
        </div>
      </div>
    `;
  } else {
    detailHtml = `
      <div class="section-label">Unsatisfied Customers — Detail</div>
      <div class="detail-table-wrap">
        <h3>Reasons Not Satisfied</h3>
        <div class="journey">No unsatisfied cases in this batch.</div>
      </div>
    `;
  }

  document.getElementById('detail-section').innerHTML = detailHtml;
  selectedCase = null;
}

function showCase(id) {
  const data = document.querySelector('#case-data [data-case="' + id + '"]');
  const panel = document.getElementById('case-detail');
  if (!data) return;

  document.querySelectorAll('.pivot-cell.active').forEach(function(el){ el.classList.remove('selected'); });
  document.querySelectorAll('.pivot-cell.active').forEach(function(el){
    if (el.getAttribute('onclick') === "showCase('" + id + "')") {
      el.classList.add('selected');
    }
  });

  const commentVal = data.dataset.comment;
  const commentHtml = (commentVal === 'No comment' || commentVal === '')
    ? '<span class="none">No comment</span>'
    : commentVal;

  panel.innerHTML =
    '<div class="case-detail-tags">' +
      '<span class="pill-static branch-pill">' + data.dataset.branch + '</span>' +
      '<span class="reason-tag">' + data.dataset.reason + '</span>' +
    '</div>' +
    '<div class="case-detail-comment-label">Comment</div>' +
    '<div class="case-detail-comment">' + commentHtml + '</div>';
}

// initial load + auto-refresh every 60 seconds
loadData();
setInterval(loadData, 60000);
</script>

</body>
</html>
